<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵光谱 - 心理能量类型测试</title>
    <style>
        :root {
            --bg: #f4f2ee;
            --card: #ffffff;
            --text: #1e1e1e;
            --sub: #6e6e6e;
            --accent: #4a6fa5;
            --accent-soft: #eaf1f8;
            --border: #e2ddd6;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --radius: 20px;
            --transition: 0.3s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(160deg, #f7f5f2 0%, #eae6df 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            width: 100%;
            max-width: 620px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .progress-wrap {
            margin-bottom: 28px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--sub);
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .progress-track {
            height: 6px;
            background: #e7e3db;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 5%;
        }
        .question-area {
            display: block;
        }
        .q-badge {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            background: var(--accent-soft);
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 14px;
        }
        .q-text {
            font-size: 1.4rem;
            font-weight: 650;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt {
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            border: 2px solid #ece8e0;
            border-radius: 14px;
            background: #fcfbf9;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: var(--text);
        }
        .opt:hover {
            border-color: #c4c0b8;
            background: #f8f6f2;
            transform: translateX(3px);
        }
        .opt.selected {
            border-color: var(--accent);
            background: #f1f6fc;
            font-weight: 550;
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.08);
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            gap: 14px;
        }
        .btn {
            padding: 13px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .btn-back {
            background: transparent;
            color: var(--sub);
            border: 2px solid #d9d4cc;
        }
        .btn-back:hover {
            background: #f5f2ed;
            color: #1e1e1e;
        }
        .btn-next,
        .btn-submit {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 6px 16px rgba(74, 111, 165, 0.25);
        }
        .btn-next:hover,
        .btn-submit:hover {
            background: #3a5787;
            transform: translateY(-1px);
            box-shadow: 0 8px 22px rgba(74, 111, 165, 0.35);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .result-area {
            display: none;
            text-align: center;
        }
        .type-code {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .type-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .type-tagline {
            font-size: 1rem;
            color: var(--sub);
            font-style: italic;
            margin-bottom: 24px;
        }
        .type-summary {
            text-align: left;
            background: #faf9f6;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid #e9e4da;
            line-height: 1.8;
        }
        .spectrum-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin: 18px 0 8px;
        }
        .spec-item {
            text-align: center;
            min-width: 60px;
        }
        .spec-val {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
        .spec-lbl {
            font-size: 0.75rem;
            color: var(--sub);
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }
        .btn-restart {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 13px 32px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            font-size: 0.95rem;
            margin-top: 10px;
        }
        .btn-restart:hover {
            background: var(--accent-soft);
        }
        @media (max-width: 480px) {
            .card {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1.2rem;
            }
            .type-code {
                font-size: 2.8rem;
                letter-spacing: 3px;
            }
            .type-name {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="mainCard">
            <div id="headerArea">
                <div class="progress-wrap">
                    <div class="progress-info">
                        <span id="progressLabel">第 1 / 20 题</span>
                        <span id="progressPercent">5%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width:5%"></div>
                    </div>
                </div>
            </div>
            <div id="questionArea" class="question-area"></div>
            <div class="nav-row" id="navRow">
                <button class="btn btn-back" id="btnBack" disabled>← 上一题</button>
                <button class="btn btn-next" id="btnNext" disabled>下一题 →</button>
                <button class="btn btn-submit" id="btnSubmit" style="display:none;">🔮 生成我的类型</button>
            </div>
            <div id="resultArea" class="result-area"></div>
        </div>
    </div>
    <script>

                { text: "我对生活节奏的偏好是：", options: ["喜欢规律与掌控感", "灵活，随遇而安", "在规律与自由间摇摆", "常常感到被节奏推着走"] },

                { text: "我对自己的了解程度：", options: ["比较清晰，知道优缺点", "在探索中，有模糊轮廓", "有时清晰有时混乱", "经常感到陌生"] },
