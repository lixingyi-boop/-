<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心灵光谱 - 心理能量类型测试</title>
    <style>
        :root {
            --bg: #f4f2ee;
            --card: #ffffff;
            --text: #1e1e1e;
            --sub: #6e6e6e;
            --accent: #4a6fa5;
            --accent-soft: #eaf1f8;
            --border: #e2ddd6;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --transition: 0.3s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: #f4f2ee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .progress-wrap {
            margin-bottom: 24px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--sub);
            font-weight: 500;
            margin-bottom: 8px;
        }
        .progress-track {
            height: 6px;
            background: #e7e3db;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 5%;
        }
        .question-area {
            display: block;
            min-height: 300px;
        }
        .q-badge {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 700;
            background: var(--accent-soft);
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 14px;
        }
        .q-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 22px;
            line-height: 1.5;
            color: #1e1e1e;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt {
            width: 100%;
            text-align: left;
            padding: 14px 18px;
            border: 2px solid #e8e3da;
            border-radius: 12px;
            background: #fcfbf8;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: var(--text);
        }
        .opt:active {
            transform: scale(0.98);
        }
        .opt.selected {
            border-color: var(--accent);
            background: #f1f6fc;
            font-weight: 550;
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.08);
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            gap: 12px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            font-family: inherit;
        }
        .btn-back {
            background: transparent;
            color: var(--sub);
            border: 2px solid #d9d4cc;
        }
        .btn-back:active {
            background: #f0ede7;
        }
        .btn-next,
        .btn-submit {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 111, 165, 0.25);
        }
        .btn-next:active,
        .btn-submit:active {
            background: #3a5787;
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .result-area {
            display: none;
            text-align: center;
        }
        .type-code {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .type-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .type-tagline {
            font-size: 0.9rem;
            color: var(--sub);
            font-style: italic;
            margin-bottom: 20px;
        }
        .type-summary {
            text-align: left;
            background: #faf9f6;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #e9e4da;
            line-height: 1.7;
            font-size: 0.95rem;
        }
        .spectrum-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 16px 0 8px;
        }
        .spec-item {
            text-align: center;
            min-width: 55px;
        }
        .spec-val {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }
        .spec-lbl {
            font-size: 0.7rem;
            color: var(--sub);
            letter-spacing: 0.5px;
        }
        .btn-restart {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .btn-restart:active {
            background: var(--accent-soft);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="mainCard">
            <div id="headerArea">
                <div class="progress-wrap">
                    <div class="progress-info">
                        <span id="progressLabel">第 1 / 20 题</span>
                        <span id="progressPercent">5%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width:5%"></div>
                    </div>
                </div>
            </div>
            <div id="questionArea" class="question-area"></div>
            <div class="nav-row" id="navRow">
                <button class="btn btn-back" id="btnBack" disabled>← 上一题</button>
                <button class="btn btn-next" id="btnNext" disabled>下一题 →</button>
                <button class="btn btn-submit" id="btnSubmit" style="display:none;">🔮 生成我的类型</button>
            </div>
            <div id="resultArea" class="result-area"></div>
        </div>
    </div>
    <script>
        (function() {

                { text: "面对他人的负面情绪，我：", options: ["能保持稳定并提供支持", "倾听但容易受影响", "想帮忙但不知所措", "感到压力，想逃离"] },
                { text: "我对'变化'的态度：", options: ["视为机会", "接受，但需要适应期", "谨慎，偏好可预测", "抗拒，变化让我不安"] },
                { text: "整体而言，最近一个月我：", options: ["状态良好，能享受生活", "基本稳定，偶有波动", "时常感到疲惫或紧张", "多数时间感到困难或低落"] }
            ];

            var typeProfiles = {
                level1: { code: "S.E.A.C.", name: "晴空型", tagline: "Stable · Empowered · Attuned · Clear", desc: "你的心理状态如开阔晴空，情绪稳定、自我认知清晰，具备良好的心理弹性和社会连接。你像一名内在的航海家，既能感受风向，也能稳稳掌舵。", color: "#3d7a5c" },
                level2: { code: "B.A.L.M.", name: "和风型", tagline: "Balanced · Adaptive · Light · Mindful", desc: "你大多数时候处于平衡状态，偶有波动但能有效调节。你拥有不错的应对资源，像一阵温和持续的风——有方向，不急迫。", color: "#6b8f3a" },
